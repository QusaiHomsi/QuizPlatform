{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:420px">
  <h2 class="text-center mb-4">Join a Quiz</h2>
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Room Code</label>
      <input name="code" class="form-control form-control-lg text-uppercase" placeholder="e.g. AB12CD" required maxlength="6"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Your Name</label>
      <input name="name" class="form-control form-control-lg" placeholder="Enter your name" required maxlength="50"/>
    </div>
    <button class="btn btn-success btn-lg w-100">Join Room</button>
  </form>
</div>
{% endblock %}
