{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
  <h1 class="display-4 fw-bold mb-2">🏆 QuizArena</h1>
  <p class="text-secondary mb-5">Real-time competitive quizzes with anti-cheat protection</p>
  <div class="row justify-content-center g-4">
    <div class="col-md-4">
      <div class="card bg-secondary-dark border-primary p-4 h-100">
        <h4 class="mb-3">Create a Room</h4>
        <p class="text-secondary small">Set up questions, control the quiz, and track results.</p>
        <form method="POST" action="/create" class="mt-auto">
          <input name="examiner_name" class="form-control mb-2" placeholder="Your name" required/>
          <button class="btn btn-primary w-100">Create Room</button>
        </form>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card bg-secondary-dark border-success p-4 h-100">
        <h4 class="mb-3">Join a Room</h4>
        <p class="text-secondary small">Enter a room code and compete against others.</p>
        <a href="/join" class="btn btn-success w-100 mt-auto">Join Room</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
