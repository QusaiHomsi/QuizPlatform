{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-3 px-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Examiner Dashboard — <span class="text-primary">{{ room.code }}</span></h4>
    <span id="q-counter" class="badge bg-secondary fs-6"></span>
  </div>
  <!-- Current question display -->
  <div class="card bg-secondary-dark p-4 mb-3" id="q-panel">
    <p class="text-secondary">Waiting for quiz to begin...</p>
  </div>
  <!-- Top 3 result panel -->
  <div class="card bg-secondary-dark p-4 mb-3 d-none" id="result-panel">
    <h5 class="mb-3">📊 Question Result — Top 3</h5>
    <div id="top3-list"></div>
    <button id="next-btn" class="btn btn-primary mt-3">Next Question →</button>
  </div>
  <!-- Contestants status -->
  <div class="card bg-secondary-dark p-3" id="contestants-panel">
    <h6 class="mb-2">Contestants</h6>
    <div id="c-list"></div>
  </div>
  <!-- Final leaderboard -->
  <div class="card bg-secondary-dark p-4 d-none" id="final-panel">
    <h4 class="mb-3">🏆 Final Leaderboard</h4>
    <div id="final-board"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/examiner_quiz.js') }}"></script>
<script>initExaminer('{{ room.code }}');</script>
{% endblock %}
