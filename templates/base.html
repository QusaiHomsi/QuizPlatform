<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ساحة الاختبار - QuizArena</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    /* RTL adjustments */
    [dir="rtl"] .ms-2 { margin-right: 0.5rem !important; margin-left: 0 !important; }
    [dir="rtl"] .me-2 { margin-left: 0.5rem !important; margin-right: 0 !important; }
    [dir="rtl"] .ms-auto { margin-right: auto !important; }
    [dir="rtl"] .me-auto { margin-left: auto !important; }
    
    /* Language Switch Button */
    .lang-switch {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: rgba(255, 165, 0, 0.95);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    [dir="rtl"] .lang-switch {
      left: auto;
      right: 15px;
    }
    .lang-switch:hover {
      background: rgba(255, 165, 0, 1);
      transform: scale(1.05);
    }
    .lang-switch-tooltip {
      display: none;
      position: absolute;
      background: #333;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 0.85rem;
      white-space: nowrap;
      top: 100%;
      margin-top: 5px;
      z-index: 1001;
    }
    [dir="ltr"] .lang-switch-tooltip {
      left: 0;
    }
    [dir="rtl"] .lang-switch-tooltip {
      right: 0;
    }
    .lang-switch:hover .lang-switch-tooltip {
      display: block;
    }
  </style>
</head>
<body class="bg-dark text-light">
<!-- Language Switch Button -->
<button class="lang-switch" id="lang-toggle" title="تبديل اللغة | Toggle Language" onclick="window.toggleLanguage()">
  <span id="lang-indicator">English</span>
  <div class="lang-switch-tooltip" id="lang-tooltip">Click to change language</div>
</button>

{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/translations.js') }}"></script>
<script>
  // Update language indicator
  function updateLangIndicator() {
    const lang = window.langManager.getCurrentLang();
    document.getElementById('lang-indicator').textContent = lang === 'ar' ? 'English 🌐' : 'العربية 🌐';
    document.getElementById('lang-tooltip').textContent = lang === 'ar' ? 'البدء بالإنجليزية' : 'البدء بالعربية';
  }
  
  // Toggle language
  window.toggleLanguage = function() {
    const lang = window.langManager.getCurrentLang();
    const newLang = lang === 'ar' ? 'en' : 'ar';
    window.langManager.setLanguage(newLang);
  };
  
  updateLangIndicator();
  window.addEventListener('languageChanged', updateLangIndicator);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
